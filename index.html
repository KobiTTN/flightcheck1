<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FlightCheck — Статус рейсу</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Barlow+Condensed:wght@300;400;600;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #080c14;
    --surface: #0d1420;
    --border: #1a2540;
    --accent: #00d4ff;
    --accent2: #0077ff;
    --green: #00ff88;
    --red: #ff3355;
    --yellow: #ffcc00;
    --text: #e0eaff;
    --muted: #4a6080;
    --mono: 'Share Tech Mono', monospace;
    --sans: 'Barlow Condensed', sans-serif;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Grid background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,212,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,212,255,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  /* Glow orb */
  body::after {
    content: '';
    position: fixed;
    top: -200px;
    left: 50%;
    transform: translateX(-50%);
    width: 600px;
    height: 600px;
    background: radial-gradient(circle, rgba(0,119,255,0.12) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  .container {
    position: relative;
    z-index: 1;
    max-width: 760px;
    margin: 0 auto;
    padding: 60px 24px 80px;
  }

  /* Header */
  header {
    display: flex;
    align-items: center;
    gap: 16px;
    margin-bottom: 64px;
  }

  .logo-icon {
    width: 44px;
    height: 44px;
    position: relative;
  }

  .logo-icon svg {
    width: 100%;
    height: 100%;
    filter: drop-shadow(0 0 8px var(--accent));
  }

  .logo-text {
    font-family: var(--sans);
    font-weight: 900;
    font-size: 22px;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: var(--accent);
  }

  .logo-text span {
    color: var(--muted);
    font-weight: 300;
  }

  .status-dot {
    margin-left: auto;
    display: flex;
    align-items: center;
    gap: 8px;
    font-family: var(--mono);
    font-size: 11px;
    color: var(--muted);
  }

  .status-dot::before {
    content: '';
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--green);
    box-shadow: 0 0 8px var(--green);
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  /* Hero */
  .hero {
    margin-bottom: 48px;
  }

  .hero-label {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--accent);
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-bottom: 12px;
    opacity: 0.7;
  }

  .hero-title {
    font-family: var(--sans);
    font-weight: 900;
    font-size: clamp(36px, 6vw, 60px);
    line-height: 0.95;
    letter-spacing: -1px;
    text-transform: uppercase;
    color: var(--text);
    margin-bottom: 16px;
  }

  .hero-title em {
    font-style: normal;
    color: var(--accent);
    text-shadow: 0 0 30px rgba(0,212,255,0.4);
  }

  .hero-sub {
    font-size: 16px;
    font-weight: 300;
    color: var(--muted);
    letter-spacing: 1px;
  }

  /* Search box */
  .search-box {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 32px;
    margin-bottom: 40px;
    position: relative;
    overflow: hidden;
  }

  .search-box::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
  }

  .search-row {
    display: flex;
    gap: 12px;
    align-items: flex-end;
  }

  .field {
    flex: 1;
  }

  .field label {
    display: block;
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 2px;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 10px;
  }

  .field input {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 3px;
    padding: 14px 18px;
    font-family: var(--mono);
    font-size: 22px;
    letter-spacing: 4px;
    color: var(--text);
    text-transform: uppercase;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }

  .field input::placeholder {
    color: var(--muted);
    opacity: 0.5;
  }

  .field input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 1px var(--accent), 0 0 20px rgba(0,212,255,0.1);
  }

  .date-field {
    width: 180px;
    flex: 0 0 180px;
  }

  .date-field input {
    font-size: 15px;
    letter-spacing: 1px;
    padding: 14px 14px;
  }

  .search-btn {
    background: var(--accent);
    border: none;
    border-radius: 3px;
    padding: 14px 28px;
    font-family: var(--sans);
    font-weight: 700;
    font-size: 14px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--bg);
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
    flex-shrink: 0;
  }

  .search-btn:hover {
    background: #fff;
    box-shadow: 0 0 20px rgba(0,212,255,0.4);
    transform: translateY(-1px);
  }

  .search-btn:active {
    transform: translateY(0);
  }

  .search-btn:disabled {
    opacity: 0.5;
    cursor: not-allowed;
    transform: none;
  }

  /* API notice */
  .api-notice {
    display: flex;
    align-items: center;
    gap: 10px;
    font-family: var(--mono);
    font-size: 11px;
    color: var(--muted);
    margin-top: 16px;
    padding: 10px 14px;
    background: rgba(255,204,0,0.05);
    border: 1px solid rgba(255,204,0,0.15);
    border-radius: 3px;
  }

  .api-notice::before {
    content: '⚠';
    color: var(--yellow);
    font-size: 13px;
    flex-shrink: 0;
  }

  /* Result card */
  .result-card {
    display: none;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    overflow: hidden;
    animation: slideUp 0.3s ease;
  }

  @keyframes slideUp {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .result-card.visible { display: block; }

  .card-header {
    padding: 24px 32px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: relative;
  }

  .card-header::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
  }

  .card-header.status-active::before { background: var(--green); }
  .card-header.status-cancelled::before { background: var(--red); }
  .card-header.status-delayed::before { background: var(--yellow); }
  .card-header.status-scheduled::before { background: var(--accent); }
  .card-header.status-landed::before { background: var(--green); }

  .flight-num {
    font-family: var(--mono);
    font-size: 32px;
    letter-spacing: 4px;
    color: var(--text);
  }

  .status-badge {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 8px 18px;
    border-radius: 2px;
    font-family: var(--sans);
    font-weight: 700;
    font-size: 13px;
    letter-spacing: 3px;
    text-transform: uppercase;
  }

  .badge-active { background: rgba(0,255,136,0.1); color: var(--green); border: 1px solid rgba(0,255,136,0.3); }
  .badge-cancelled { background: rgba(255,51,85,0.1); color: var(--red); border: 1px solid rgba(255,51,85,0.3); }
  .badge-delayed { background: rgba(255,204,0,0.1); color: var(--yellow); border: 1px solid rgba(255,204,0,0.3); }
  .badge-scheduled { background: rgba(0,212,255,0.1); color: var(--accent); border: 1px solid rgba(0,212,255,0.3); }
  .badge-landed { background: rgba(0,255,136,0.1); color: var(--green); border: 1px solid rgba(0,255,136,0.3); }

  .card-body {
    padding: 32px;
  }

  /* Route display */
  .route {
    display: flex;
    align-items: center;
    gap: 20px;
    margin-bottom: 36px;
  }

  .route-airport {
    flex: 1;
  }

  .iata {
    font-family: var(--mono);
    font-size: 48px;
    color: var(--text);
    line-height: 1;
    margin-bottom: 4px;
  }

  .city {
    font-size: 13px;
    font-weight: 300;
    color: var(--muted);
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  .time {
    font-family: var(--mono);
    font-size: 18px;
    color: var(--accent);
    margin-top: 6px;
  }

  .route-arrow {
    flex: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    color: var(--muted);
    padding: 0 10px;
  }

  .route-line {
    width: 120px;
    height: 1px;
    background: linear-gradient(90deg, var(--border), var(--accent), var(--border));
    position: relative;
  }

  .route-plane {
    font-size: 20px;
    color: var(--accent);
    filter: drop-shadow(0 0 6px var(--accent));
  }

  .route-duration {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 1px;
  }

  /* Info grid */
  .info-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 1px;
    background: var(--border);
    border: 1px solid var(--border);
    border-radius: 3px;
    overflow: hidden;
  }

  .info-cell {
    background: var(--bg);
    padding: 20px 22px;
  }

  .info-label {
    font-family: var(--mono);
    font-size: 9px;
    letter-spacing: 2px;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  .info-value {
    font-family: var(--sans);
    font-size: 18px;
    font-weight: 600;
    color: var(--text);
    letter-spacing: 1px;
  }

  /* Cancellation reason */
  .cancel-reason {
    margin-top: 24px;
    padding: 20px 24px;
    background: rgba(255,51,85,0.05);
    border: 1px solid rgba(255,51,85,0.2);
    border-radius: 3px;
    display: none;
  }

  .cancel-reason.visible { display: block; }

  .cancel-reason-label {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 2px;
    color: var(--red);
    margin-bottom: 8px;
    text-transform: uppercase;
  }

  .cancel-reason-text {
    font-size: 15px;
    font-weight: 300;
    color: var(--text);
    letter-spacing: 0.5px;
  }

  /* Loading */
  .loading {
    display: none;
    text-align: center;
    padding: 48px;
  }

  .loading.visible { display: block; }

  .loading-spinner {
    width: 40px;
    height: 40px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 16px;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .loading-text {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--muted);
    letter-spacing: 2px;
  }

  /* Error */
  .error-box {
    display: none;
    padding: 24px 28px;
    background: rgba(255,51,85,0.05);
    border: 1px solid rgba(255,51,85,0.2);
    border-radius: 4px;
    font-family: var(--mono);
    font-size: 13px;
    color: var(--red);
    letter-spacing: 1px;
    animation: slideUp 0.3s ease;
  }

  .error-box.visible { display: block; }

  /* Examples */
  .examples {
    margin-top: 16px;
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }

  .example-chip {
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 1px;
    color: var(--muted);
    padding: 5px 12px;
    border: 1px solid var(--border);
    border-radius: 2px;
    cursor: pointer;
    transition: all 0.15s;
    text-transform: uppercase;
  }

  .example-chip:hover {
    color: var(--accent);
    border-color: var(--accent);
  }

  /* Footer */
  footer {
    margin-top: 80px;
    padding-top: 24px;
    border-top: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-family: var(--mono);
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 1px;
  }

  @media (max-width: 600px) {
    .search-row { flex-direction: column; }
    .date-field { width: 100%; flex: auto; }
    .info-grid { grid-template-columns: repeat(2, 1fr); }
    .route { flex-direction: column; text-align: center; }
    .route-arrow { flex-direction: row; }
    .route-line { width: 60px; }
  }
</style>
</head>
<body>
<div class="container">

  <header>
    <div class="logo-icon">
      <svg viewBox="0 0 44 44" fill="none">
        <path d="M8 22 L22 8 L36 22" stroke="#00d4ff" stroke-width="1.5" stroke-linecap="round"/>
        <path d="M22 8 L22 36" stroke="#00d4ff" stroke-width="1.5" stroke-linecap="round"/>
        <circle cx="22" cy="22" r="20" stroke="#00d4ff" stroke-width="0.5" opacity="0.3"/>
        <circle cx="22" cy="22" r="3" fill="#00d4ff"/>
      </svg>
    </div>
    <div class="logo-text">Flight<span>Check</span></div>
    <div class="status-dot">API LIVE</div>
  </header>

  <div class="hero">
    <div class="hero-label">// Перевірка статусу рейсу</div>
    <h1 class="hero-title">
      Рейс<br><em>скасовано?</em>
    </h1>
    <p class="hero-sub">Введи номер рейсу — дізнайся статус миттєво</p>
  </div>

  <div class="search-box">
    <div class="search-row">
      <div class="field">
        <label>Номер рейсу</label>
        <input type="text" id="flightInput" placeholder="PS 101" maxlength="8" />
      </div>
      <div class="field date-field">
        <label>Дата</label>
        <input type="date" id="dateInput" />
      </div>
      <button class="search-btn" id="searchBtn" onclick="checkFlight()">
        Шукати
      </button>
    </div>

    <div class="api-notice" style="border-color:rgba(0,255,136,0.2);background:rgba(0,255,136,0.04);color:#4a8060;">
      ✓ Підключено через локальний проксі (localhost:3000)
    </div>
  </div>

  <div class="loading" id="loading">
    <div class="loading-spinner"></div>
    <div class="loading-text">CHECKING FLIGHT DATA...</div>
  </div>

  <div class="error-box" id="errorBox"></div>

  <div class="result-card" id="resultCard">
    <div class="card-header" id="cardHeader">
      <div class="flight-num" id="resultFlightNum"></div>
      <div class="status-badge" id="statusBadge"></div>
    </div>
    <div class="card-body">
      <div class="route">
        <div class="route-airport">
          <div class="iata" id="depIata"></div>
          <div class="city" id="depCity"></div>
          <div class="time" id="depTime"></div>
        </div>
        <div class="route-arrow">
          <div class="route-plane">✈</div>
          <div class="route-line"></div>
          <div class="route-duration" id="duration"></div>
        </div>
        <div class="route-airport" style="text-align:right">
          <div class="iata" id="arrIata"></div>
          <div class="city" id="arrCity"></div>
          <div class="time" id="arrTime"></div>
        </div>
      </div>

      <div class="info-grid">
        <div class="info-cell">
          <div class="info-label">Авіакомпанія</div>
          <div class="info-value" id="airline"></div>
        </div>
        <div class="info-cell">
          <div class="info-label">Термінал</div>
          <div class="info-value" id="terminal"></div>
        </div>
        <div class="info-cell">
          <div class="info-label">Гейт</div>
          <div class="info-value" id="gate"></div>
        </div>
        <div class="info-cell">
          <div class="info-label">Тип літака</div>
          <div class="info-value" id="aircraft"></div>
        </div>
        <div class="info-cell">
          <div class="info-label">Затримка</div>
          <div class="info-value" id="delay"></div>
        </div>
        <div class="info-cell">
          <div class="info-label">Оновлено</div>
          <div class="info-value" id="updated"></div>
        </div>
      </div>

      <div class="cancel-reason" id="cancelReason">
        <div class="cancel-reason-label">// Причина скасування</div>
        <div class="cancel-reason-text" id="cancelReasonText"></div>
      </div>
    </div>
  </div>

  <footer>
    <span>FLIGHTCHECK v1.0</span>
    <span id="footerTime"></span>
  </footer>

</div>

<script>
  // Set default date to today
  const today = new Date().toISOString().split('T')[0];
  document.getElementById('dateInput').value = today;

  // Footer time
  function updateTime() {
    const now = new Date();
    document.getElementById('footerTime').textContent =
      now.toUTCString().replace('GMT', 'UTC');
  }
  updateTime();
  setInterval(updateTime, 1000);

  function setExample(flight) {
    document.getElementById('flightInput').value = flight;
    document.getElementById('flightInput').focus();
  }

  // ─────────────────────────────────────────────────────
  // DEMO DATA — замінити на реальний API виклик нижче
  // ─────────────────────────────────────────────────────
  const DEMO_FLIGHTS = {
    'PS101': {
      status: 'scheduled',
      dep: { iata: 'KBP', city: 'Київ Бориспіль', time: '09:40' },
      arr: { iata: 'WAW', city: 'Варшава', time: '10:30' },
      airline: 'МАУ', terminal: 'D', gate: 'D16',
      aircraft: 'B737-800', delay: '0 хв', duration: '1г 50хв',
    },
    'LH400': {
      status: 'active',
      dep: { iata: 'FRA', city: 'Франкфурт', time: '10:25' },
      arr: { iata: 'JFK', city: 'Нью-Йорк', time: '13:05' },
      airline: 'Lufthansa', terminal: 'A', gate: 'A26',
      aircraft: 'A340-600', delay: '12 хв', duration: '9г 40хв',
    },
    'FR8010': {
      status: 'cancelled',
      dep: { iata: 'DUB', city: 'Дублін', time: '06:15' },
      arr: { iata: 'BCN', city: 'Барселона', time: '09:45' },
      airline: 'Ryanair', terminal: '1', gate: '—',
      aircraft: 'B737-800', delay: '—', duration: '2г 30хв',
      cancelReason: 'Технічна несправність повітряного судна. Зверніться до авіакомпанії для переведення або відшкодування.',
    },
    'KL905': {
      status: 'delayed',
      dep: { iata: 'AMS', city: 'Амстердам', time: '14:10' },
      arr: { iata: 'LHR', city: 'Лондон Хітроу', time: '14:25' },
      airline: 'KLM', terminal: 'E', gate: 'E19',
      aircraft: 'E190', delay: '85 хв', duration: '1г 15хв',
    },
  };

  const STATUS_MAP = {
    active:    { label: '✈ В ПОЛЬОТІ',   cls: 'badge-active',    headerCls: 'status-active' },
    scheduled: { label: '○ ЗАПЛАНОВАНО', cls: 'badge-scheduled', headerCls: 'status-scheduled' },
    cancelled: { label: '✕ СКАСОВАНО',   cls: 'badge-cancelled', headerCls: 'status-cancelled' },
    delayed:   { label: '⟳ ЗАТРИМКА',    cls: 'badge-delayed',   headerCls: 'status-delayed' },
    landed:    { label: '✓ ПРИЗЕМЛИВСЯ', cls: 'badge-landed',    headerCls: 'status-landed' },
  };

  function hide(id) { document.getElementById(id).classList.remove('visible'); }
  function show(id) { document.getElementById(id).classList.add('visible'); }

  async function checkFlight() {
    const raw = document.getElementById('flightInput').value.trim().toUpperCase().replace(/\s+/g, '');
    if (!raw) {
      showError('Введи номер рейсу (наприклад: PS 101)');
      return;
    }

    hide('resultCard');
    hide('errorBox');
    document.getElementById('searchBtn').disabled = true;
    show('loading');

    const API_KEY = '688628ba299a5bf8b1fc6bc1ad519d25';
    const date = document.getElementById('dateInput').value;

    try {
      const base = window.location.origin.includes('localhost') || window.location.protocol === 'file:'
        ? 'http://localhost:3000'
        : window.location.origin;
      const res = await fetch(`${base}/flight?iata=${raw}&date=${date}`);

      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const json = await res.json();

      hide('loading');
      document.getElementById('searchBtn').disabled = false;

      if (json.error) {
        showError(`API помилка: ${json.error.message || JSON.stringify(json.error)}`);
        return;
      }

      // AeroDataBox повертає масив або об'єкт з полем items
      const flights = Array.isArray(json) ? json : (json.items || [json]);
      const f = flights[0];
      if (!f) {
        showError(`Рейс "${raw}" не знайдено на дату ${date}. Спробуй іншу дату або номер.`);
        return;
      }

      // Визначаємо статус
      let status = 'scheduled';
      if (f.status) {
        const s = f.status.toLowerCase();
        if (s.includes('cancel')) status = 'cancelled';
        else if (s.includes('landed') || s.includes('arrived')) status = 'landed';
        else if (s.includes('active') || s.includes('airborne') || s.includes('departed')) status = 'active';
        else if (s.includes('delay')) status = 'delayed';
      }

      const depDelay = f.departure?.delay || 0;
      if (depDelay > 15 && status === 'scheduled') status = 'delayed';

      const data = {
        status,
        dep: {
          iata: f.departure?.airport?.iata || '—',
          city: f.departure?.airport?.name || '—',
          time: f.departure?.scheduledTime?.local?.slice(11,16) || f.departure?.scheduledTime?.utc?.slice(11,16) || '—',
        },
        arr: {
          iata: f.arrival?.airport?.iata || '—',
          city: f.arrival?.airport?.name || '—',
          time: f.arrival?.scheduledTime?.local?.slice(11,16) || f.arrival?.scheduledTime?.utc?.slice(11,16) || '—',
        },
        airline: f.airline?.name || '—',
        terminal: f.departure?.terminal || '—',
        gate: f.departure?.gate || '—',
        aircraft: f.aircraft?.model || f.aircraft?.reg || '—',
        delay: depDelay ? depDelay + ' хв' : '0 хв',
        duration: '—',
        cancelReason: status === 'cancelled' ? 'Рейс скасовано авіакомпанією.' : null,
      };

      renderResult(raw, data);

    } catch (err) {
      hide('loading');
      document.getElementById('searchBtn').disabled = false;
      if (err.message.includes('Failed to fetch') || err.message.includes('NetworkError')) {
        showError('⚠ Браузер заблокував HTTP запит (mixed content). Скачай файл і відкрий локально через file://');
      } else {
        showError(`Помилка: ${err.message}`);
      }
    }
  }

  function renderResult(flightCode, data) {
    const st = STATUS_MAP[data.status] || STATUS_MAP['scheduled'];

    document.getElementById('resultFlightNum').textContent = flightCode;
    document.getElementById('statusBadge').className = 'status-badge ' + st.cls;
    document.getElementById('statusBadge').textContent = st.label;

    const header = document.getElementById('cardHeader');
    header.className = 'card-header ' + st.headerCls;

    document.getElementById('depIata').textContent = data.dep.iata;
    document.getElementById('depCity').textContent = data.dep.city;
    document.getElementById('depTime').textContent = data.dep.time;
    document.getElementById('arrIata').textContent = data.arr.iata;
    document.getElementById('arrCity').textContent = data.arr.city;
    document.getElementById('arrTime').textContent = data.arr.time;
    document.getElementById('duration').textContent = data.duration;

    document.getElementById('airline').textContent = data.airline;
    document.getElementById('terminal').textContent = data.terminal;
    document.getElementById('gate').textContent = data.gate;
    document.getElementById('aircraft').textContent = data.aircraft;
    document.getElementById('delay').textContent = data.delay;
    document.getElementById('updated').textContent = 'ЗАРАЗ';

    const cr = document.getElementById('cancelReason');
    if (data.cancelReason) {
      document.getElementById('cancelReasonText').textContent = data.cancelReason;
      cr.classList.add('visible');
    } else {
      cr.classList.remove('visible');
    }

    show('resultCard');
  }

  function showError(msg) {
    hide('loading');
    hide('resultCard');
    document.getElementById('searchBtn').disabled = false;
    document.getElementById('errorBox').textContent = '// ' + msg;
    show('errorBox');
  }

  document.getElementById('flightInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') checkFlight();
  });
</script>
</body>
</html>
